<section class="bg-dark text-white min-vh-100 py-5">
  <div class="container">

    <div class="text-center mb-5">
      <span class="badge bg-warning text-dark px-3 py-2 rounded-pill fw-bold text-uppercase shadow-sm mb-3">Merchandising Oficial</span>
      <h1 class="display-4 fw-bold">Accesorios <span class="text-warning">Ninja y Geek</span></h1>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">

      <div class="col">
        <div class="card h-100 bg-dark border-secondary border-opacity-25 shadow-lg text-white card-accessory">
          <div class="position-relative p-3 d-flex justify-content-center" style="height: 250px;">
            <img ngSrc="assets/images/kunai.jpg" width="250" height="250" priority class="img-fluid rounded-3" style="object-fit: contain;" alt="Kunai Naruto">
          </div>
          <div class="card-body text-center d-flex flex-column">
            <h5 class="card-title fw-bold mb-1">Kunai de Acero</h5>
            <small class="text-secondary mb-3 text-uppercase">Naruto Shippuden</small>
            <div class="mt-auto">
              <p class="text-warning fw-bold fs-4 mb-3">12.90€</p>
              <button (click)="agregarAlCarrito('Kunai de Acero', 12.90, 'assets/images/kunai.jpg')" class="btn btn-warning w-100 rounded-pill fw-bold text-dark">
                AÑADIR AL EQUIPO
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card h-100 bg-dark border-secondary border-opacity-25 shadow-lg text-white card-accessory">
          <div class="p-3 d-flex justify-content-center" style="height: 250px;">
            <img ngSrc="assets/images/naruto.png" width="250" height="250" class="img-fluid rounded-3" style="object-fit: contain;" alt="Colgante Naruto">
          </div>
          <div class="card-body text-center d-flex flex-column">
            <h5 class="card-title fw-bold mb-1">Colgante Naruto</h5>
            <small class="text-secondary mb-3 text-uppercase">Colección Akatsuki</small>
            <div class="mt-auto">
              <p class="text-warning fw-bold fs-4 mb-3">8.50€</p>
              <button (click)="agregarAlCarrito('Colgante Naruto', 8.50, 'assets/images/naruto.png')" class="btn btn-warning w-100 rounded-pill fw-bold text-dark">
                AÑADIR AL EQUIPO
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card h-100 bg-dark border-secondary border-opacity-25 shadow-lg text-white card-accessory">
          <div class="p-3 d-flex justify-content-center" style="height: 250px;">
            <img ngSrc="assets/images/accesoriooferta.jpg" width="250" height="250" class="img-fluid rounded-3" style="object-fit: contain;" alt="Pendientes Tanjiro">
          </div>
          <div class="card-body text-center d-flex flex-column">
            <h5 class="card-title fw-bold mb-1">Pendientes Hanafuda</h5>
            <small class="text-secondary mb-3 text-uppercase">Kimetsu no Yaiba</small>
            <div class="mt-auto">
              <p class="text-warning fw-bold fs-4 mb-3">14.95€</p>
              <button (click)="agregarAlCarrito('Pendientes Hanafuda', 14.95, 'assets/images/accesoriooferta.jpg')" class="btn btn-warning w-100 rounded-pill fw-bold text-dark">
                AÑADIR AL EQUIPO
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card h-100 bg-dark border-secondary border-opacity-25 shadow-lg text-white card-accessory">
          <div class="p-3 d-flex justify-content-center" style="height: 250px;">
            <img ngSrc="assets/images/camiseta.png" width="250" height="250" class="img-fluid rounded-3" style="object-fit: contain;" alt="Camiseta Otaku">
          </div>
          <div class="card-body text-center d-flex flex-column">
            <h5 class="card-title fw-bold mb-1">Camiseta Otaku</h5>
            <small class="text-secondary mb-3 text-uppercase">Accesorios Ninja</small>
            <div class="mt-auto">
              <p class="text-warning fw-bold fs-4 mb-3">9.90€</p>
              <button (click)="agregarAlCarrito('Camiseta Otaku', 9.90, 'assets/images/camiseta.png')" class="btn btn-warning w-100 rounded-pill fw-bold text-dark">
                AÑADIR AL EQUIPO
              </button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
