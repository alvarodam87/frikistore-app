<main class="flex-grow-1 py-5 bg-light">
  <section class="container">

    <h1 class="fw-bold display-5 mb-5 text-center text-uppercase">Catálogo de <span class="text-warning">Figuras</span></h1>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">

      @for (producto of listaProductos; track producto.nombre) {
        <article class="col d-flex justify-content-center">

          <div class="card h-100 shadow-sm border border-2 border-dark rounded-4 overflow-hidden product-card" style="width: 300px;">

            <div class="position-relative bg-white p-3 d-flex align-items-center justify-content-center" style="height: 250px;">
              @if (producto.nuevo) {
                <span class="badge bg-danger position-absolute top-0 start-0 m-2 z-1">¡Nuevo!</span>
              }

              <img [ngSrc]="producto.imagen"
                   width="300"
                   height="250"
                   class="img-fluid rounded"
                   [alt]="'Figura de ' + producto.nombre"
                   style="max-height: 100%; width: auto; object-fit: contain;"
                   priority>
            </div>

            <div class="card-body d-flex flex-column text-center bg-light border-top border-dark">
              <h3 class="h6 card-title fw-bold text-uppercase mb-1">{{producto.nombre}}</h3>
              <p class="small text-secondary mb-3">{{producto.serie}}</p>

              <div class="mt-auto">
                <p class="text-dark fw-bold bg-warning px-3 py-1 rounded-pill d-inline-block mx-auto mb-3 fs-5">
                  {{producto.precio}}€
                </p>

                <button (click)="agregarAlCarrito(producto.nombre, producto.precio, producto.imagen)"
                        class="btn btn-warning rounded-pill fw-bold text-dark text-uppercase shadow-sm w-100">
                  <i class="bi bi-cart-plus me-1"></i> Añadir al equipo
                </button>
              </div>
            </div>
          </div>
        </article>
      }

    </div>
  </section>
</main>
